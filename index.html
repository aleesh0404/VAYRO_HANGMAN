<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hangman — WordDuel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- BOTTOM-LEFT: Branding -->
  <div class="branding-tag">
    <span class="branding-dot"></span>
    <span class="branding-text">Powered by <strong>Vayro_games</strong></span>
    <span class="branding-dot"></span>
  </div>

  <!-- BOTTOM-RIGHT: Theme Toggle -->
  <button class="theme-toggle" id="themeToggle">
    <span id="themeIcon">🌙</span>
    <span id="themeLabel">DARK</span>
  </button>

  <!-- ANIMATED CANVAS BG -->
  <canvas id="bgCanvas" class="bg-canvas"></canvas>

  <!-- ░░░░░░░░░░░░  LANDING  ░░░░░░░░░░░░ -->
  <section class="screen active" id="landingScreen">
    <div class="landing-wrap">

      <div class="logo-area">
        <div class="logo-orbit-ring"></div>
        <div class="logo-orbit-ring ring2"></div>
        <svg class="logo-figure" viewBox="0 0 100 130" width="88" height="115">
          <!-- Rope -->
          <line x1="50" y1="0" x2="50" y2="18" stroke="var(--accent-gold)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Head -->
          <circle cx="50" cy="33" r="15" fill="none" stroke="var(--accent-gold)" stroke-width="2.5"/>
          <!-- Eyes -->
          <circle cx="44" cy="30" r="2" fill="var(--accent-gold)"/>
          <circle cx="56" cy="30" r="2" fill="var(--accent-gold)"/>
          <!-- Smile -->
          <path d="M44,38 Q50,44 56,38" fill="none" stroke="var(--accent-gold)" stroke-width="2" stroke-linecap="round"/>
          <!-- Body -->
          <line x1="50" y1="48" x2="50" y2="82" stroke="var(--accent-cyan)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Arms -->
          <line x1="50" y1="58" x2="32" y2="74" stroke="var(--accent-cyan)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="50" y1="58" x2="68" y2="74" stroke="var(--accent-cyan)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Legs -->
          <line x1="50" y1="82" x2="34" y2="104" stroke="var(--accent-cyan)" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="50" y1="82" x2="66" y2="104" stroke="var(--accent-cyan)" stroke-width="2.5" stroke-linecap="round"/>
          <!-- Feet -->
          <line x1="34" y1="104" x2="24" y2="116" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round"/>
          <line x1="66" y1="104" x2="76" y2="116" stroke="var(--accent-cyan)" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1 class="logo-title">HANG<span class="c-gold">MAN</span></h1>
        <p class="logo-sub">Guess it before it's too late</p>
      </div>

      <div class="stats-strip">
        <div class="s-box">
          <span class="s-val" id="lsScore">0</span>
          <span class="s-key">SCORE</span>
        </div>
        <div class="s-divider"></div>
        <div class="s-box">
          <span class="s-val" id="lsWins">0</span>
          <span class="s-key">WINS</span>
        </div>
        <div class="s-divider"></div>
        <div class="s-box">
          <span class="s-val" id="lsStreak">0</span>
          <span class="s-key">BEST STREAK</span>
        </div>
      </div>

      <button class="btn-play" id="btnStart">
        <div class="btn-play-shine"></div>
        <span class="btn-play-icon">▶</span>
        <span class="btn-play-text">PLAY NOW</span>
      </button>

    </div>
  </section>

  <!-- ░░░░░░░░░░░░  CATEGORIES  ░░░░░░░░░░░░ -->
  <section class="screen" id="categoryScreen">

    <div class="cat-topbar">
      <button class="btn-nav" id="backToLanding">‹ Back</button>
      <div class="cat-topbar-center">
        <h2 class="page-title">Choose <span class="c-gold">Category</span></h2>
      </div>
      <div class="score-tag">
        <span class="score-tag-label">SCORE</span>
        <span class="score-tag-val" id="catScoreDisplay">0</span>
      </div>
    </div>

    <div class="cat-grid" id="catGrid">
      <!-- Cards injected by JS -->
    </div>

  </section>

  <!-- ░░░░░░░░░░░░  GAME  ░░░░░░░░░░░░ -->
  <section class="screen" id="gameScreen">

    <div class="game-topbar">
      <button class="btn-nav sm" id="backToCats">‹ Menu</button>
      <div class="game-meta-center">
        <span class="cat-tag" id="catTag">FOOD</span>
        <span class="score-tag sm">
          <span class="score-tag-label">SCORE</span>
          <span class="score-tag-val" id="gScoreVal">0</span>
        </span>
      </div>
      <div class="lives-hearts" id="livesHearts"></div>
    </div>

    <div class="game-arena">

      <!-- LEFT: Gallows -->
      <div class="gallows-panel">
        <div class="gallows-lives-label">
          <span id="livesNum">7</span><span class="lives-slash">/7</span>
          <span class="lives-word">lives</span>
        </div>

        <div class="gallows-svg-wrap">
          <svg class="gallows-svg" viewBox="0 0 230 270" xmlns="http://www.w3.org/2000/svg" id="gallowsSvg">
            <!-- Platform & Post -->
            <rect x="5" y="252" width="220" height="10" rx="5" fill="var(--gallows-col)"/>
            <rect x="52" y="16" width="10" height="244" rx="5" fill="var(--gallows-col)"/>
            <rect x="52" y="16" width="110" height="10" rx="5" fill="var(--gallows-col)"/>
            <rect x="155" y="16" width="7" height="42" rx="3.5" fill="var(--gallows-col)"/>
            <!-- Diagonal brace -->
            <line x1="52" y1="62" x2="92" y2="26" stroke="var(--gallows-col)" stroke-width="7" stroke-linecap="round"/>

            <!-- Body parts — opacity toggled by JS -->
            <!-- 1 Head -->
            <circle id="hp1" class="hp" cx="158" cy="76" r="21" fill="none" stroke="var(--hang-col)" stroke-width="4" opacity="0"/>
            <!-- 1b Face -->
            <g id="hp1b" class="hp" opacity="0">
              <circle cx="150" cy="73" r="2.8" fill="var(--hang-col)"/>
              <circle cx="166" cy="73" r="2.8" fill="var(--hang-col)"/>
              <path d="M151,82 Q158,88 165,82" fill="none" stroke="var(--hang-col)" stroke-width="2.5" stroke-linecap="round"/>
            </g>
            <!-- 2 Body -->
            <line id="hp2" class="hp" x1="158" y1="97" x2="158" y2="168" stroke="var(--hang-col)" stroke-width="4" stroke-linecap="round" opacity="0"/>
            <!-- 3 Left Arm -->
            <line id="hp3" class="hp" x1="158" y1="115" x2="122" y2="150" stroke="var(--hang-col)" stroke-width="4" stroke-linecap="round" opacity="0"/>
            <!-- 4 Right Arm -->
            <line id="hp4" class="hp" x1="158" y1="115" x2="194" y2="150" stroke="var(--hang-col)" stroke-width="4" stroke-linecap="round" opacity="0"/>
            <!-- 5 Left Leg -->
            <line id="hp5" class="hp" x1="158" y1="168" x2="122" y2="215" stroke="var(--hang-col)" stroke-width="4" stroke-linecap="round" opacity="0"/>
            <!-- 6 Right Leg -->
            <line id="hp6" class="hp" x1="158" y1="168" x2="194" y2="215" stroke="var(--hang-col)" stroke-width="4" stroke-linecap="round" opacity="0"/>
            <!-- 7 Left Foot -->
            <line id="hp7" class="hp" x1="122" y1="215" x2="102" y2="234" stroke="var(--hang-col)" stroke-width="4" stroke-linecap="round" opacity="0"/>
          </svg>
        </div>

        <div class="wrong-panel">
          <div class="wrong-panel-label">MISSED</div>
          <div class="wrong-chips" id="wrongChips"></div>
        </div>
      </div>

      <!-- RIGHT: Word + KB -->
      <div class="word-panel">

        <div class="hint-bar">
          <span class="hint-tag">HINT</span>
          <span class="hint-text" id="hintText">—</span>
        </div>

        <div class="word-slots" id="wordSlots"></div>

        <div class="word-meta-info" id="wordMeta"></div>

        <div class="keyboard" id="keyboard"></div>

      </div>
    </div>
  </section>

  <!-- ░░░░░░░░░░░░  RESULT MODAL  ░░░░░░░░░░░░ -->
  <div class="modal-overlay hidden" id="resultModal">
    <div class="modal-card" id="modalCard">
      <div class="modal-confetti-zone" id="confettiZone"></div>
      <div class="modal-emo" id="modalEmo">🎉</div>
      <h3 class="modal-title" id="modalTitle">You Won!</h3>
      <p class="modal-desc" id="modalDesc">Excellent work!</p>
      <div class="modal-word" id="modalWord"></div>
      <div class="modal-pts" id="modalPts"></div>
      <div class="modal-actions">
        <button class="mbt primary" id="btnNext">Next Word ›</button>
        <button class="mbt secondary" id="btnBackCats">Categories</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="script.js"></script>
</body>
</html>
